# tinyowl nginx 站点配置
# - 托管前端 SPA 静态产物
# - /api 反代到后端容器（SSE 实时进度需关闭缓冲）
# - HTTPS（证书挂载自宿主机 /etc/nginx/certs）

# HTTP 跳转 HTTPS
server {
    listen 80;
    server_name tinyowl.cn www.tinyowl.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name tinyowl.cn www.tinyowl.cn;

    ssl_certificate     /etc/nginx/certs/tinyowl.cn_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/tinyowl.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # API 反代后端容器（compose 服务名 backend:3000）
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE：检测进度为流式响应，必须关闭缓冲并允许长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # SPA 前端路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
